name: GameNerdz Deal of the Day

on:
  schedule:
    - cron: '5 18 * * *'   # 1:05 PM ET (18:05 UTC = EST / 17:05 UTC = EDT)
    - cron: '5 19 * * *'   # 2:05 PM ET backup (in case GitHub skips the 1pm run)
  workflow_dispatch:         # Allows manual trigger from GitHub UI

jobs:
  check-dotd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Restore sent-today marker so we don't double-send
      - name: Restore DotD sent cache
        uses: actions/cache/restore@v4
        with:
          path: gamenerdz_sent.txt
          key: gamenerdz-sent-latest
          restore-keys: |
            gamenerdz-sent-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check GameNerdz Deal of the Day
        env:
          BGG_API_TOKEN:          ${{ secrets.BGG_API_TOKEN }}
          ALERT_EMAIL:            ${{ secrets.ALERT_EMAIL }}
          GMAIL_USER:             ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:     ${{ secrets.GMAIL_APP_PASSWORD }}
          GREEN_API_INSTANCE_ID:  ${{ secrets.GREEN_API_INSTANCE_ID }}
          GREEN_API_TOKEN:        ${{ secrets.GREEN_API_TOKEN }}
          WHATSAPP_PHONE:         ${{ secrets.WHATSAPP_PHONE }}
        run: python gamenerdz_dotd.py --once

      - name: Save DotD sent cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: gamenerdz_sent.txt
          key: gamenerdz-sent-latest
