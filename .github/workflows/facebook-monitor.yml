name: Facebook Board Game Deals Monitor

on:
  schedule:
    - cron: '0 */2 * * *'   # Every 2 hours (top of hour: 00:00, 02:00, 04:00 ...)
  workflow_dispatch:          # Allow manual trigger from GitHub Actions UI

jobs:
  check-facebook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Restore seen_fb_posts.json so we don't re-alert on posts we've already processed
      - name: Restore Facebook monitor state cache
        uses: actions/cache/restore@v4
        with:
          path: seen_fb_posts.json
          key: fb-monitor-state-latest
          restore-keys: |
            fb-monitor-state-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: playwright install chromium --with-deps

      - name: Run Facebook deal monitor
        env:
          FB_EMAIL:               ${{ secrets.FB_EMAIL }}
          FB_PASSWORD:            ${{ secrets.FB_PASSWORD }}
          BGG_API_TOKEN:          ${{ secrets.BGG_API_TOKEN }}
          GREEN_API_INSTANCE_ID:  ${{ secrets.GREEN_API_INSTANCE_ID }}
          GREEN_API_TOKEN:        ${{ secrets.GREEN_API_TOKEN }}
          WHATSAPP_PHONE:         ${{ secrets.WHATSAPP_PHONE }}
        run: python monitor.py --fb-once

      # Save seen_fb_posts.json even if the run step fails, so state is preserved
      - name: Save Facebook monitor state cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_fb_posts.json
          key: fb-monitor-state-latest
