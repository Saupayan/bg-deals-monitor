name: Board Game Deals Monitor

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes
  workflow_dispatch:          # Allows manual trigger from GitHub UI
  repository_dispatch:        # Allows trigger via GitHub API (e.g. from WhatsApp bot)
    types: [check-deals]

jobs:
  check-deals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Restore state files so we don't re-alert old BGG deals or double-send GameNerdz DotD
      - name: Restore monitor state cache
        uses: actions/cache/restore@v4
        with:
          path: |
            seen_threads.json
            gamenerdz_sent.txt
          key: monitor-state-latest
          restore-keys: |
            monitor-state-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Playwright + Chromium are only needed for the --force path (WhatsApp manual trigger),
      # which also runs the Facebook group scraper. Skip on every-15-min scheduled runs.
      - name: Install Playwright + Chromium (force trigger only)
        if: github.event_name == 'repository_dispatch'
        run: playwright install chromium --with-deps

      - name: Run deal monitor (single check — all sources)
        env:
          BGG_API_TOKEN:          ${{ secrets.BGG_API_TOKEN }}
          ALERT_EMAIL:            ${{ secrets.ALERT_EMAIL }}
          GMAIL_USER:             ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:     ${{ secrets.GMAIL_APP_PASSWORD }}
          GREEN_API_INSTANCE_ID:  ${{ secrets.GREEN_API_INSTANCE_ID }}
          GREEN_API_TOKEN:        ${{ secrets.GREEN_API_TOKEN }}
          WHATSAPP_PHONE:         ${{ secrets.WHATSAPP_PHONE }}
          FB_EMAIL:               ${{ secrets.FB_EMAIL }}
          FB_PASSWORD:            ${{ secrets.FB_PASSWORD }}
          FB_COOKIES:             ${{ secrets.FB_COOKIES }}
          CHECK_INTERVAL_MINUTES: '60'
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "Manual WhatsApp trigger — sending all current deals (--force)"
            python monitor.py --force 2>&1 | tee /tmp/monitor_output.log
          else
            python monitor.py --once 2>&1 | tee /tmp/monitor_output.log
          fi

      # Output Facebook debug lines as a step summary so they're easy to find
      - name: FB Debug Summary
        if: always()
        run: |
          echo "## Facebook Scraper Debug" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "FB\[PW\]:|FB:" /tmp/monitor_output.log 2>/dev/null | head -80 || echo "(no FB output found)"
          grep -E "FB\[PW\]:|FB:" /tmp/monitor_output.log 2>/dev/null | head -80 >> $GITHUB_STEP_SUMMARY || echo "(no FB output found)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # Save state so next run knows what was already processed / sent
      - name: Save monitor state cache
        uses: actions/cache/save@v4
        if: always()   # save even if the check step failed
        with:
          path: |
            seen_threads.json
            gamenerdz_sent.txt
          key: monitor-state-latest
