name: BGG Hot Deals Monitor

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes
  workflow_dispatch:          # Allows manual trigger from GitHub UI
  repository_dispatch:        # Allows trigger via GitHub API (e.g. from WhatsApp bot)
    types: [check-deals]

jobs:
  check-deals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Restore seen_threads.json from cache so we don't re-alert old deals
      - name: Restore seen threads cache
        uses: actions/cache/restore@v4
        with:
          path: seen_threads.json
          key: seen-threads-latest
          restore-keys: |
            seen-threads-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run BGG deal monitor (single check)
        env:
          BGG_API_TOKEN:          ${{ secrets.BGG_API_TOKEN }}
          ALERT_EMAIL:            ${{ secrets.ALERT_EMAIL }}
          GMAIL_USER:             ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:     ${{ secrets.GMAIL_APP_PASSWORD }}
          GREEN_API_INSTANCE_ID:  ${{ secrets.GREEN_API_INSTANCE_ID }}
          GREEN_API_TOKEN:        ${{ secrets.GREEN_API_TOKEN }}
          WHATSAPP_PHONE:         ${{ secrets.WHATSAPP_PHONE }}
          CHECK_INTERVAL_MINUTES: '60'
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "Manual WhatsApp trigger detected — sending all current deals (--force)"
            python monitor.py --force
          else
            python monitor.py --once
          fi

      # Save seen_threads.json so next run knows what we already processed
      - name: Save seen threads cache
        uses: actions/cache/save@v4
        if: always()   # save even if the check step failed
        with:
          path: seen_threads.json
          key: seen-threads-latest
