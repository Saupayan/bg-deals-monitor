name: Board Game Deals Monitor

on:
  schedule:
    - cron: '0 * * * *'   # Every hour (on the hour)
  workflow_dispatch:          # Allows manual trigger from GitHub UI
  repository_dispatch:        # Allows trigger via GitHub API (e.g. from WhatsApp bot)
    types: [check-deals]

jobs:
  check-deals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Restore state files so we don't re-alert old BGG deals or double-send GameNerdz DotD
      - name: Restore monitor state cache
        uses: actions/cache/restore@v4
        with:
          path: |
            seen_threads.json
            gamenerdz_sent.txt
            bgo_sent.json
            ttm_sent.json
          key: monitor-state-latest
          restore-keys: |
            monitor-state-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run deal monitor (single check — all sources)
        env:
          BGG_API_TOKEN:          ${{ secrets.BGG_API_TOKEN }}
          ALERT_EMAIL:            ${{ secrets.ALERT_EMAIL }}
          GMAIL_USER:             ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:     ${{ secrets.GMAIL_APP_PASSWORD }}
          GREEN_API_INSTANCE_ID:  ${{ secrets.GREEN_API_INSTANCE_ID }}
          GREEN_API_TOKEN:        ${{ secrets.GREEN_API_TOKEN }}
          WHATSAPP_PHONE:         ${{ secrets.WHATSAPP_PHONE }}
          CHECK_INTERVAL_MINUTES: '60'
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "Manual WhatsApp trigger — sending all current deals (--force)"
            python monitor.py --force
          else
            python monitor.py --once
          fi

      # Save state so next run knows what was already processed / sent
      - name: Save monitor state cache
        uses: actions/cache/save@v4
        if: always()   # save even if the check step failed
        with:
          path: |
            seen_threads.json
            gamenerdz_sent.txt
            bgo_sent.json
            ttm_sent.json
          key: monitor-state-latest
