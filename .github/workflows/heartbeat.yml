name: BGG Monitor Heartbeat

on:
  schedule:
    - cron: '0 * * * *'   # Top of every hour (12:00, 13:00, 14:00 ...)
  workflow_dispatch:        # Allow manual trigger from GitHub UI for testing

jobs:
  heartbeat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send heartbeat WhatsApp
        env:
          BGG_API_TOKEN:          ${{ secrets.BGG_API_TOKEN }}
          ALERT_EMAIL:            ${{ secrets.ALERT_EMAIL }}
          GMAIL_USER:             ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:     ${{ secrets.GMAIL_APP_PASSWORD }}
          GREEN_API_INSTANCE_ID:  ${{ secrets.GREEN_API_INSTANCE_ID }}
          GREEN_API_TOKEN:        ${{ secrets.GREEN_API_TOKEN }}
          WHATSAPP_PHONE:         ${{ secrets.WHATSAPP_PHONE }}
          CHECK_INTERVAL_MINUTES: '60'
        run: python monitor.py --heartbeat
